name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          automake
    
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install cython
    
    - name: Build APK with Buildozer
      run: |
        buildozer android debug
    
    - name: Get version from spec
      id: get_version
      run: |
        VERSION=$(grep "^version = " buildozer.spec | cut -d'=' -f2 | tr -d ' ')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    
    - name: Get APK filename
      id: apk_file
      run: |
        APK_PATH=$(find ./bin -name "*.apk" | head -n 1)
        echo "path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_PATH"
    
    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ steps.get_version.outputs.version }}-${{ github.run_number }}
        name: BunnyBot v${{ steps.get_version.outputs.version }} Build ${{ github.run_number }}
        body: |
          🐰 **BunnyBot Android APK**
          
          📦 Version: ${{ steps.get_version.outputs.version }}
          🔨 Build: ${{ github.run_number }}
          📅 Date: ${{ github.event.head_commit.timestamp }}
          
          ### What's New
          - Automatic build from GitHub Actions
          - Fixed buildozer.spec with proper OpenCV support
          - Improved Android compatibility
          - Enhanced error handling and crash logging
          
          ### Installation
          1. Download the APK below
          2. Enable "Install from Unknown Sources" on your Android device
          3. Install the APK
          4. Grant all requested permissions
          
          ### Features
          - ✅ Template matching with OpenCV
          - ✅ Smart vision system
          - ✅ Battery optimized (0.5s intervals)
          - ✅ Floating UI overlay
          - ✅ Auto-reset functionality
        draft: false
        prerelease: false
        files: ./bin/*.apk
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bunnybot-apk
        path: ./bin/*.apk
